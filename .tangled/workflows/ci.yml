when:
  - event: ["push", "pull_request"]
    branch: ["main"]
  - event: ["manual"]

engine: "nixery"

dependencies:
  nixpkgs:
    - python312
    - uv
    - ruff

steps:
  - name: "Lint"
    # ruff comes from nixpkgs, not the pip wheel: the wheel is a prebuilt ELF
    # that expects the FHS dynamic loader, which the nix runner doesn't provide.
    command: "ruff check && ruff format --check"
  - name: "Test"
    command: "uv sync --frozen && uv run pytest"
