name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Lint
        run: uv sync --frozen && uv run ruff check && uv run ruff format --check

      - name: Test
        run: uv run pytest
