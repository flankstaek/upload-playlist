name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Lint
        run: uv sync --frozen && uv run ruff check && uv run ruff format --check
      - name: Test
        run: uv run pytest

  release:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package plugin
        run: |
          mkdir upload_playlist
          cp PLUGININFO __init__.py upload_playlist/
          zip -r upload_playlist.zip upload_playlist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: upload_playlist.zip
          generate_release_notes: true
